# Example Codex MCP configuration snippet.
# Replace the absolute path with this repository's local path.

[mcp_servers.tdai-memory]
command = "python3"
args = ["-m", "tdai_memory_mcp"]
default_tools_approval_mode = "auto"

[mcp_servers.tdai-memory.env]
